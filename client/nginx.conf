server {
    listen 80;
    server_name localhost;

    # Increase body size limit for medical image uploads (50MB)
    client_max_body_size 50M;

    root /usr/share/nginx/html;
    index index.html;

    # API routes must be defined BEFORE the root location
    # to prevent them from being caught by try_files
    location /api/ {
        proxy_pass http://FrACT-server:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Increase buffer size for large file uploads
        proxy_request_buffering off;
        proxy_buffering off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
